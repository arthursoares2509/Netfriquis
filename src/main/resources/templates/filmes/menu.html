<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu — Netfriquis</title>
<style>
  :root {
    --bg: #000;
    --text: white;
    --accent: #e50914;
    --accent-dark: #b00610;
  }
  [data-theme="light"] {
    --bg: #f8f9fa;
    --text: #212529;
  }
  html,body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;transition:background .4s,color .4s}
  .header{background:var(--accent);padding:24px;text-align:center;font-size:32px;font-weight:900;position:relative}
  .theme-toggle{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:none;border:none;color:white;font-size:24px;cursor:pointer}
  .container{text-align:center;padding:80px 20px}
  h2{margin-bottom:50px;font-size:28px}
  .btn-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;max-width:900px;margin:0 auto}
  button{background:var(--accent);border:none;padding:20px;color:white;border-radius:12px;font-size:20px;font-weight:bold;cursor:pointer;transition:.3s}
  button:hover{background:var(--accent-dark)}
</style>
</head>
<body>
<header class="header">
  NETFRIQUIS
  <button class="theme-toggle" aria-label="Alternar tema">☀️</button>
</header>
<section class="container">
  <h2>Escolha uma opção</h2>
  <div class="btn-grid">
    <a href="/cadastro"><button>Cadastrar Filme</button></a>
    <a href="/analise"><button>Ver Filmes e Análises</button></a>
    <a href="/gerenciamento"><button>Gerenciar Filmes</button></a>
  </div>
</section>
<script>
  const toggle = document.querySelector('.theme-toggle');
  const currentTheme = localStorage.getItem('theme') || 'dark';
  if (currentTheme === 'light') document.documentElement.setAttribute('data-theme', 'light');
  toggle.textContent = currentTheme === 'light' ? '🌙' : '☀️';

  toggle.addEventListener('click', () => {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme', 'dark');
      toggle.textContent = '☀️';
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
      localStorage.setItem('theme', 'light');
      toggle.textContent = '🌙';
    }
  });
</script>
</body>
</html>
