<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gerenciamento — Netfriquis</title>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/js/app.js"></script>
<style>
  :root {
    --accent: #e50914;
    --accent-dark: #b00610;
    --radius: 14px;
    --shadow: 0 12px 32px rgba(0,0,0,.7);
    --bg: #000;
    --text: white;
    --card-bg: #111;
    --input-bg: #0c0c0c;
    --input-border: rgba(255,255,255,.1);
  }
  [data-theme="light"] {
    --bg: #f8f9fa;
    --text: #212529;
    --card-bg: #ffffff;
    --input-bg: #ffffff;
    --input-border: #ddd;
    --shadow: 0 12px 32px rgba(0,0,0,.1);
  }
  body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;min-height:100vh;transition:all .4s}
  .header{background:var(--accent);padding:24px;text-align:center;font-size:30px;font-weight:900;position:relative}
  .theme-toggle{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:none;border:none;color:white;font-size:24px;cursor:pointer}
  .back-btn{position:absolute;left:20px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:white;font-size:24px;cursor:pointer}
  .container{max-width:960px;margin:40px auto;padding:0 20px}
  .card{background:var(--card-bg);padding:28px;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:30px;border:1px solid rgba(255,255,255,.04);transition:all .4s}
  [data-theme="light"] .card{border:1px solid #eee}
  .title{font-size:22px;font-weight:900;margin-bottom:8px}
  .fields{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0}
  input,textarea{background:var(--input-bg);border:1px solid var(--input-border);padding:14px;border-radius:10px;color:var(--text);transition:all .3s}
  textarea{grid-column:1/3;min-height:120px}
  .date-display{font-family:monospace;letter-spacing:3px;font-size:17px}
  .btn{background:var(--accent);border:none;padding:12px 24px;border-radius:10px;color:white;font-weight:900;cursor:pointer;transition:.3s}
  .btn:hover{background:var(--accent-dark)}
  .toast{position:fixed;right:20px;top:20px;background:#161616;padding:16px 20px;border-radius:10px;box-shadow:var(--shadow);z-index:9999;display:none;color:white}
  [data-theme="light"] .toast{background:#333}
  @media(max-width:720px){.fields{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="header">
  <a href="/menu" class="back-btn">←</a>
  NETFRIQUIS — Gerenciamento
  <button class="theme-toggle" aria-label="Alternar tema">☀️</button>
</header>
<div class="container">
  <div id="listaGerenciamento"></div>
</div>
<div id="toast" class="toast"></div>
<script>
  const toggle = document.querySelector('.theme-toggle');
  const currentTheme = localStorage.getItem('theme') || 'dark';
  if (currentTheme === 'light') document.documentElement.setAttribute('data-theme', 'light');
  toggle.textContent = currentTheme === 'light' ? '🌙' : '☀️';

  toggle.addEventListener('click', () => {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme', 'dark');
      toggle.textContent = '☀️';
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
      localStorage.setItem('theme', 'light');
      toggle.textContent = '🌙';
    }
  });
</script>
</body>
</html>
