<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Análises — Netfriquis</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/js/app.js"></script>

  <style>
    :root {
      --accent: #e50914;
      --accent-dark: #b00610;
      --radius: 14px;
      --shadow: 0 12px 32px rgba(0, 0, 0, .7);
      --bg: #000;
      --text: white;
      --card-bg: #111;
      --input-bg: #0c0c0c;
      --input-border: rgba(255, 255, 255, .1);
    }

    [data-theme="light"] {
      --bg: #f8f9fa;
      --text: #212529;
      --card-bg: #ffffff;
      --input-bg: #ffffff;
      --input-border: #ddd;
      --shadow: 0 12px 32px rgba(0, 0, 0, .1);
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      min-height: 100vh;
      transition: all .4s;
    }

    .header {
      position: relative;
      padding: 24px;
      background: var(--accent);
      text-align: center;
      font-size: 30px;
      font-weight: 900;
    }

    .theme-toggle {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
    }

    .back-btn {
      position: absolute;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      margin-bottom: 30px;
      padding: 28px;
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, .04);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: all .4s;
    }

    [data-theme="light"] .card {
      border: 1px solid #eee;
    }

    .title {
      margin-bottom: 8px;
      font-size: 24px;
      font-weight: 900;
    }

    .info {
      margin-bottom: 20px;
      color: #999;
      font-size: 15px;
    }

    [data-theme="light"] .info {
      color: #666;
    }

    .sinopse {
      margin: 20px 0;
      padding: 16px;
      background: #0a0a0a;
      border-radius: 10px;
      line-height: 1.6;
    }

    [data-theme="light"] .sinopse {
      background: #f0f0f0;
      color: #333;
    }

    .star-rating {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .star {
      color: #444;
      font-size: 34px;
      cursor: pointer;
      transition: .2s;
    }

    .star.filled {
      color: gold;
      transform: scale(1.15);
      text-shadow: 0 0 12px gold;
    }

    textarea {
      width: 100%;
      min-height: 100px;
      padding: 16px;
      resize: vertical;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      color: var(--text);
      transition: all .3s;
    }

    .btn {
      padding: 12px 24px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 900;
      cursor: pointer;
      transition: .3s;
    }

    .btn:hover {
      background: var(--accent-dark);
    }

    .analise-item {
      margin-top: 16px;
      padding: 16px;
      background: #0a0a0a;
      border-radius: 10px;
      transition: all .4s;
    }

    [data-theme="light"] .analise-item {
      background: #f5f5f5;
    }

    .analise-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: none;
      padding: 16px 20px;
      background: #161616;
      border-radius: 10px;
      box-shadow: var(--shadow);
      color: white;
    }

    [data-theme="light"] .toast {
      background: #333;
    }
  </style>
</head>

<body>
  <header class="header">
    <a href="/menu" class="back-btn">←</a>

    NETFRIQUIS — Análises

    <button
      class="theme-toggle"
      aria-label="Alternar tema"
    >
      ☀️
    </button>
  </header>

  <main class="container">
    <div id="listaAnalises"></div>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const themeToggle = document.querySelector('.theme-toggle');
    const root = document.documentElement;

    const savedTheme = localStorage.getItem('theme') || 'dark';

    if (savedTheme === 'light') {
      root.setAttribute('data-theme', 'light');
    }

    themeToggle.textContent =
      savedTheme === 'light'
        ? '🌙'
        : '☀️';

    themeToggle.addEventListener('click', () => {
      const isLightTheme =
        root.getAttribute('data-theme') === 'light';

      if (isLightTheme) {
        root.removeAttribute('data-theme');
        localStorage.setItem('theme', 'dark');
        themeToggle.textContent = '☀️';
        return;
      }

      root.setAttribute('data-theme', 'light');
      localStorage.setItem('theme', 'light');
      themeToggle.textContent = '🌙';
    });
  </script>
</body>
</html>
